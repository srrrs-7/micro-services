apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-api
  labels:
    app.kubernetes.io/name: queue
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: queue
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queue
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: kustomize
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: queue
                    app.kubernetes.io/component: api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: queue-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: grpc
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
