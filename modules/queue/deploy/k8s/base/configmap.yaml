apiVersion: v1
kind: ConfigMap
metadata:
  name: queue-api-config
data:
  # OpenTelemetry — see audit-api-config for the disable knob.
  OTEL_SERVICE_NAME: queue-api
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=queue,deployment.environment=k8s-dev
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER: always_on
