apiVersion: batch/v1
kind: Job
metadata:
  name: audit-migrate
  labels:
    app.kubernetes.io/name: audit
    app.kubernetes.io/component: migrate
    app.kubernetes.io/managed-by: kustomize
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit
        app.kubernetes.io/component: migrate
        app.kubernetes.io/managed-by: kustomize
    spec:
      restartPolicy: Never
      containers:
        - name: atlas
          image: migrator
          imagePullPolicy: IfNotPresent
          args:
            - migrate
            - apply
            - --url
            - $(DB_URL)
            - --dir
            - file:///go/modules/audit/src/infra/database/migrations
          envFrom:
            - secretRef:
                name: audit-api-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
