apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-worker
  labels:
    app.kubernetes.io/name: audit
    app.kubernetes.io/component: worker
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audit
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit
        app.kubernetes.io/component: worker
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: worker
          image: audit-worker
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: audit-worker-config
            - secretRef:
                name: audit-api-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
