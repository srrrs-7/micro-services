apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-api
  labels:
    app.kubernetes.io/name: audit
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audit
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: api
          image: audit-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: audit-api-config
            - secretRef:
                name: audit-api-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
