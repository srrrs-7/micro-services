apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-api
  labels:
    app.kubernetes.io/name: audit
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: audit
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: kustomize
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: audit
                    app.kubernetes.io/component: api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: audit-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: grpc
          envFrom:
            - configMapRef:
                name: audit-api-config
            - secretRef:
                name: audit-api-secret
          # Native gRPC probe (k8s 1.24+ GA). The audit server registers
          # grpc.health.v1 with the empty service in SERVING, so an unset
          # `service:` field is sufficient. `port:` MUST be numeric here —
          # the native gRPC probe does not accept named ports.
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
