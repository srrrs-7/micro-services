# Gateway API resources for north-south traffic into auth-api.
#
# `gatewayClassName: istio` makes Istio (installed via `make istio-up`)
# the implementation. Istio auto-provisions a Deployment + ClusterIP
# Service named `auth-gateway-istio` in this namespace.
# Dev host access is via `make istio-port-forward` — NodePort + kind
# extraPortMappings was tried and abandoned, see `deploy/k8s/istio.md` §3.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: auth-gateway
  namespace: auth
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: auth
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  parentRefs:
    - name: auth-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: auth-api
          port: 8080
