# OTEL_EXPORTER_OTLP_ENDPOINT is interpolated from the host shell so the
# default (unset → empty) keeps utilotel.Init in noop mode. The obs stack
# lives in otel/compose.yml; the obs-* Make targets pull it in via
# `-f compose.yml -f otel/compose.yml`.

services:
  migrator:
    build:
      context: .
      dockerfile: ./.images/migrator/Dockerfile
    container_name: migrator
    working_dir: /go/src
    networks:
      - internal

  # audit
  audit-api:
    build:
      context: .
      dockerfile: ./.images/audit/api.Dockerfile
    container_name: audit-api
    depends_on:
      audit-db:
        condition: service_healthy
    environment:
      OTEL_SERVICE_NAME: audit-api
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=audit,deployment.environment=local
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: always_on
    networks:
      - internal
  audit-db:
    image: postgres:latest
    container_name: audit-db
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    volumes:
      - audit-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
  audit-worker:
    build:
      dockerfile: ./.images/audit/worker.Dockerfile
    container_name: audit-worker
    environment:
      OTEL_SERVICE_NAME: audit-worker
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=audit,deployment.environment=local
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: always_on
    networks:
      - internal

  # auth
  auth-api:
    build:
      context: .
      dockerfile: ./.images/auth/api.Dockerfile
    container_name: auth-api
    depends_on:
      auth-db:
        condition: service_healthy
      auth_cache:
        condition: service_healthy
    environment:
      OTEL_SERVICE_NAME: auth-api
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=auth,deployment.environment=local
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: always_on
    networks:
      - internal
  auth-db:
    image: postgres:latest
    container_name: auth-db
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    volumes:
      - auth-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
  auth_cache:
    image: redis:latest
    container_name: auth-cache
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # queue
  queue-api:
    build:
      context: .
      dockerfile: ./.images/queue/Dockerfile
    container_name: queue-api
    environment:
      OTEL_SERVICE_NAME: queue-api
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=queue,deployment.environment=local
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: always_on
    networks:
      - internal

volumes:
  audit-db:
    driver: local
  auth-db:
    driver: local

networks:
  internal:
    driver: bridge
