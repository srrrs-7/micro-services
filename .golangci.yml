version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # --- error handling (must) ---
    - errcheck                    # unchecked errors (incl. type assertions)
    - errchkjson                  # unchecked encoding/json marshal/unmarshal errors
    - nilerr                      # `return nil` after a non-nil err check
    # --- resource handling (must) ---
    - bodyclose                   # missing http.Response.Body.Close()
    - rowserrcheck                # missing sql.Rows.Err() after iteration
    - sqlclosecheck               # unclosed sql.Rows / sql.Stmt
    - noctx                       # http requests without a context
    # --- exhaustiveness (must) ---
    - exhaustive                  # non-exhaustive switch/map over enums
    # --- static analysis ---
    - govet
    - staticcheck                 # incl. former gosimple
    - unused
    - ineffassign
    # --- code quality ---
    - misspell
    - gocritic
    - dupl
    - predeclared                 # shadowing of predeclared identifiers
    - nolintlint                  # malformed //nolint directives
    - gocheckcompilerdirectives   # malformed //go: directives

  settings:
    errcheck:
      check-type-assertions: true   # x.(T) without comma-ok is an error
      check-blank: true             # `_ = f()` for error-returning f is an error
      exclude-functions:
        - (net/http.ResponseWriter).Write
    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true
    misspell:
      locale: US
    nolintlint:
      require-explanation: true     # //nolint:foo // <reason> is required
      require-specific: true        # //nolint must name the linter(s)
      allow-unused: false

  exclusions:
    presets:
      - std-error-handling
    rules:
      # Tests intentionally ignore many returns and may have helpful duplication.
      - path: '_test\.go'
        linters:
          - errcheck
          - errchkjson
          - dupl
          - noctx        # httptest.NewRequest is fine in tests
      - path: 'testutil/'
        linters:
          - errcheck
          - errchkjson

formatters:
  enable:
    - gofmt
    - goimports
