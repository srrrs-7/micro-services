global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Services push metrics via OTLP to the Collector; Prometheus scrapes the
  # Collector's prometheus exporter. There are no per-service /metrics
  # endpoints — see otel/README.md for the reasoning.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Self-monitor.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Istio control plane (k8s-only — `make obs-up` Compose path will show
  # this as a down target because there is no istiod outside k8s; ignore).
  # Cross-ns DNS works because Prometheus runs in the observability ns and
  # the istio-system Service is cluster-DNS reachable.
  #
  # Auth: dev は plain HTTP scrape で OK (`/metrics` は istiod が認証なしで
  # 公開)。staging/prod 昇格時は projected ServiceAccount token を使った
  # bearer 認証 + AuthorizationPolicy で istiod:15014 を保護すること。
  # 必要になったら以下を追加:
  #   authorization:
  #     type: Bearer
  #     credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  #   tls_config:
  #     ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  #     server_name: istiod.istio-system.svc
  - job_name: istiod
    static_configs:
      - targets: ["istiod.istio-system.svc.cluster.local:15014"]
    metrics_path: /metrics
